<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Solar Fusion Background */
        .bg-solar-fusion {
            background: linear-gradient(-45deg, #FFD600, #F4680B, #FFB600, #FF8C00);
            background-size: 400% 400%;
            animation: gradientWave 10s ease infinite;
        }
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Ambient Glow Shadows */
        .shadow-ambient {
            box-shadow: 0 20px 40px -10px rgba(244, 104, 11, 0.15);
        }

<body class="bg-background text-on-background min-h-screen flex flex-col font-sans antialiased overflow-x-hidden">
<!-- Note: TopNavBar is suppressed on transactional pages like Login based on the Shell Visibility & Relevance Filter, 
         but the prompt explicitly requested it be included, so it is rendered here. 
         Active state is unset as 'Sign In' is not a primary navigation destination in the JSON. -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 bg-surface/60 dark:bg-surface-dim/60 backdrop-blur-xl shadow-[0px_4px_20px_rgba(244,104,11,0.1)]">
<div class="font-headline-sm text-headline-sm font-bold text-secondary">
            Siddhivinayak Services
        </div>
<div class="hidden md:flex gap-md items-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="home.html">Home</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="services.html">Services</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-200" href="catalog.html">Buy</a>
</div>
<div>
<button class="font-label-bold text-label-bold bg-primary-container text-on-primary-container px-6 py-2 rounded-full hover:brightness-110 transition-all shadow-[0_4px_14px_0_rgba(255,214,0,0.39)]">
                Sign In
            </button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-[100px] pb-[80px] relative">
<!-- Animated Background Texture / Gradient Glow -->
<div class="absolute inset-0 z-0 bg-solar-fusion opacity-10"></div>
<div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-primary-container/20 via-transparent to-transparent"></div>
<div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-secondary-container/20 via-transparent to-transparent"></div>
<!-- Login Card Container -->
<div class="relative z-10 w-full max-w-md mx-margin-mobile md:mx-auto">
<div class="bg-surface/80 backdrop-blur-xl rounded-[24px] p-8 md:p-10 shadow-ambient border-[0.5px] border-white/40 flex flex-col gap-8 relative overflow-hidden">
<!-- Inner subtle glow effect for the card -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-container/30 rounded-full blur-3xl pointer-events-none"></div>
<!-- Header -->
<div class="text-center flex flex-col gap-2 relative z-10">
<h1 class="font-headline-md text-headline-md text-on-surface">Sign In</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back to Siddhivinayak Services</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6 relative z-10" id="loginForm">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-on-surface-variant material-symbols-outlined pointer-events-none" data-icon="mail">mail</span>
<input class="w-full bg-secondary/5 border border-transparent rounded-xl py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 focus:outline-none transition-all duration-300" id="email" name="email" placeholder="you@example.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-label-bold text-label-bold text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<span class="absolute left-4 text-on-surface-variant material-symbols-outlined pointer-events-none" data-icon="lock">lock</span>
<input class="w-full bg-secondary/5 border border-transparent rounded-xl py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 focus:outline-none transition-all duration-300" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-4 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="peer w-5 h-5 appearance-none border border-outline-variant rounded bg-surface checked:bg-primary-container checked:border-primary-container focus:outline-none focus:ring-2 focus:ring-primary-container/30 transition-all cursor-pointer" id="remember" name="remember" type="checkbox">
<span class="absolute text-on-primary-container material-symbols-outlined pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity scale-75 left-[1px]" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember Me</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 mt-2 rounded-xl font-label-bold text-label-bold text-on-primary bg-gradient-to-r from-primary-container to-secondary-container hover:from-[#E9C400] hover:to-[#E05F00] shadow-[0_8px_16px_-4px_rgba(244,104,11,0.2)] hover:shadow-[0_12px_24px_-4px_rgba(244,104,11,0.3)] transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
                        Sign In
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2 z-10">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink-0 mx-4 font-body-md text-body-md text-on-surface-variant">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Secondary Action -->
<div class="text-center relative z-10">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Don't have an account? 
                        <a class="font-label-bold text-label-bold text-secondary hover:text-primary transition-colors ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
</main>
<!-- Note: Footer is suppressed on transactional pages like Login based on the Shell Visibility & Relevance Filter, 
         but the prompt explicitly requested it be included, so it is rendered here. -->
<footer class="w-full py-lg px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-md bg-surface-container-lowest dark:bg-surface-container-high border-t border-outline-variant/10">
<div class="font-headline-sm text-headline-sm text-primary">
            Siddhivinayak Services
        </div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100 transition-opacity" href="#">Contact Us</a>
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100 transition-opacity" href="#">Privacy Policy</a>
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100 transition-opacity" href="#">Terms of Service</a>
</div>
<div class="font-body-md text-body-md text-on-surface-variant">
            © 2024 Siddhivinayak Services. All rights reserved.
        </div>
</footer>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value;
                let name = email.split('@')[0];
                name = name.charAt(0).toUpperCase() + name.slice(1);
                localStorage.setItem('userName', name);
                window.location.href = 'home.html';
            });
        }
    });
</script>
</body></html>
