<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Order Receipt - Siddhivinayak Services</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="auth.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#705d00",
                        secondary: "#a14100",
                        surface: "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "on-surface-variant": "#4d4632",
                        "surface-container": "#f0eded",
                        "outline-variant": "#d0c6ab",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff"
                    },
                    fontFamily: {
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-bold": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(244, 104, 11, 0.1);
        }
        .bg-solar-fusion {
            background: linear-gradient(-45deg, #FFD600, #F4680B, #FFB600, #FF8C00);
            background-size: 400% 400%;
            animation: gradientWave 10s ease infinite;
        }
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen font-body-md antialiased bg-solar-fusion flex flex-col">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm">
    <div class="flex justify-between items-center px-6 md:px-16 h-20 w-full max-w-7xl mx-auto">
        <a class="font-bold text-2xl bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent" href="home.html">
            Siddhivinayak Services
        </a>
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='home.html'" class="text-primary hover:text-secondary transition-colors font-label-bold flex items-center gap-2">
                <span class="material-symbols-outlined">home</span> Home
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow pt-32 pb-24 px-6 md:px-16 max-w-3xl mx-auto w-full">
    <div class="glass-panel rounded-2xl p-8 flex flex-col items-center gap-6">
        
        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-2">
            <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </div>
        
        <h1 class="font-headline-md text-3xl text-center text-primary font-bold">Order Placed Successfully!</h1>
        <p class="text-center text-on-surface-variant">Thank you for your purchase. Here is your receipt.</p>
        
        <div class="w-full bg-white rounded-xl border border-outline-variant/30 p-6 shadow-sm flex flex-col gap-4 mt-4">
            <h2 class="font-bold text-lg border-b border-outline-variant/20 pb-2 mb-2">Receipt Details</h2>
            
            <div id="receipt-items" class="flex flex-col gap-3">
                <!-- Dynamically populated -->
            </div>
            
            <div class="h-px bg-outline-variant/20 w-full my-2"></div>
            
            <div class="flex flex-col gap-2 text-on-surface-variant text-sm">
                <div class="flex justify-between">
                    <span>Subtotal</span>
                    <span id="receipt-subtotal">₹0.00</span>
                </div>
                <div class="flex justify-between">
                    <span>Shipping</span>
                    <span id="receipt-delivery">₹0.00</span>
                </div>
                <div class="flex justify-between">
                    <span>GST (18%)</span>
                    <span id="receipt-gst">₹0.00</span>
                </div>
            </div>
            
            <div class="h-px bg-outline-variant/20 w-full my-2"></div>
            
            <div class="flex justify-between items-center font-bold text-lg text-primary">
                <span>Total Amount Paid</span>
                <span id="receipt-total">₹0.00</span>
            </div>
        </div>

        <button onclick="window.location.href='catalog.html'" class="mt-4 px-8 py-3 bg-gradient-to-r from-primary to-secondary text-white font-bold rounded-full shadow-md hover:shadow-lg transition-all active:scale-95">
            Continue Shopping
        </button>

    </div>
</main>

<script>
function getCartKey() {
    return 'cart_' + (getCurrentUserEmail() || 'guest');
}

function getOrdersKey() {
    return 'orders_' + (getCurrentUserEmail() || 'guest');
}

document.addEventListener('DOMContentLoaded', () => {
    let cartKey = getCartKey();
    let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
    let itemsContainer = document.getElementById('receipt-items');
    
    if (cart.length === 0) {
        itemsContainer.innerHTML = '<p class="text-on-surface-variant italic">No items found.</p>';
        return;
    }
    
    let subtotal = 0;
    
    cart.forEach(item => {
        let itemTotal = item.price * item.quantity;
        subtotal += itemTotal;
        
        itemsContainer.innerHTML += `
        <div class="flex justify-between items-start">
            <div>
                <span class="font-semibold text-on-surface">${item.name}</span>
                <div class="text-on-surface-variant text-xs">Qty: ${item.quantity}</div>
            </div>
            <span class="font-semibold">₹${Number(itemTotal).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
        </div>`;
    });
    
    let gst = subtotal * 0.18;
    let delivery = (subtotal > 0) ? (subtotal * 0.05) : 0; 
    let total = subtotal + gst + delivery;
    
    document.getElementById('receipt-subtotal').innerText = '₹' + Number(subtotal).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('receipt-gst').innerText = '₹' + Number(gst).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('receipt-delivery').innerText = '₹' + Number(delivery).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('receipt-total').innerText = '₹' + Number(total).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    
    // Save order history
    let ordersKey = getOrdersKey();
    let orders = JSON.parse(localStorage.getItem(ordersKey)) || [];
    let orderId = '#ORD-' + Math.floor(Math.random() * 9000 + 1000);
    let orderDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    let mainItem = cart[0] ? cart[0].name + (cart.length > 1 ? ` +${cart.length - 1} more` : '') : 'Items';
    
    orders.push({
        id: orderId,
        item: mainItem,
        status: 'Processing',
        date: orderDate,
        total: total.toFixed(2)
    });
    localStorage.setItem(ordersKey, JSON.stringify(orders));
    
    // Save to global admin orders
    let globalOrders = JSON.parse(localStorage.getItem('all_orders')) || [];
    let shippingInfo = JSON.parse(localStorage.getItem('current_checkout_shipping')) || {};
    
    globalOrders.push({
        id: orderId,
        userEmail: getCurrentUserEmail() || 'guest',
        item: mainItem,
        fullCart: cart,
        status: 'Processing',
        date: orderDate,
        total: total.toFixed(2),
        shipping: shippingInfo
    });
    localStorage.setItem('all_orders', JSON.stringify(globalOrders));
    
    // Clear the cart and shipping temp after rendering receipt
    localStorage.removeItem(cartKey);
    localStorage.removeItem('current_checkout_shipping');
});
</script>

</body>
</html>
