<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddhivinayak Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
        }

        .glowing-text {
            font-size: 4rem;
            font-weight: 800;
            color: transparent;
            background: linear-gradient(90deg, #FFD600, #F4680B, #FFD600);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 2s linear infinite, glow 2s ease-in-out infinite alternate;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(255, 214, 0, 0.5), 0 0 20px rgba(244, 104, 11, 0.5);
            }
            to {
                text-shadow: 0 0 20px rgba(255, 214, 0, 0.8), 0 0 40px rgba(244, 104, 11, 0.8), 0 0 60px rgba(255, 214, 0, 0.6);
            }
        }

        .fade-out {
            animation: fadeOut 1s ease-in-out forwards;
            animation-delay: 2.5s;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @media (max-width: 768px) {
            .glowing-text {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="loader-container fade-out">
        <h1 class="glowing-text">Siddhivinayak Services</h1>
    </div>

    <script>
        // Redirect to home page after animation completes
        setTimeout(() => {
            window.location.href = "home.html";
        }, 3000);
    </script>
</body>
</html>
